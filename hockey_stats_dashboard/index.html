<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hockey Stats Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; font-family: system-ui; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useMemo } = React;

    function HockeyStatsDashboard() {
      const [data, setData] = useState([]);
      const [currentPage, setCurrentPage] = useState('game');
      const [selectedGames, setSelectedGames] = useState([]);
      const [selectedTeams, setSelectedTeams] = useState([]);
      const [selectedStrengths, setSelectedStrengths] = useState([]);
      const [selectedGameTypes, setSelectedGameTypes] = useState([]);
      const [gameFiltersOpen, setGameFiltersOpen] = useState(false);
      const [teamFiltersOpen, setTeamFiltersOpen] = useState(false);
      const [strengthFiltersOpen, setStrengthFiltersOpen] = useState(false);
      const [gameTypeFiltersOpen, setGameTypeFiltersOpen] = useState(false);

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const csv = e.target.result;
          const lines = csv.split('\n').filter(line => line.trim());
          const headers = lines[0].split(',').map(h => h.trim());
          const parsedData = lines.slice(1).map(line => {
            const values = line.split(',').map(v => v.trim());
            const row = {};
            headers.forEach((header, idx) => {
              row[header] = values[idx] || '';
            });
            return row;
          }).filter(row => row.Game);
          setData(parsedData);
        };
        reader.readAsText(file);
      };

      const games = useMemo(() => [...new Set(data.map(row => row.Game))].sort(), [data]);
      const teams = useMemo(() => [...new Set(data.map(row => row.Team))].sort(), [data]);
      const strengths = useMemo(() => [...new Set(data.map(row => row.Strength).filter(s => s))], [data]);
      const gameTypes = useMemo(() => {
        const gameTypeKey = Object.keys(data[0] || {}).find(k => k.toLowerCase().includes('game') && k.toLowerCase().includes('type'));
        if (!gameTypeKey) return [];
        return [...new Set(data.map(row => row[gameTypeKey]).filter(s => s))].sort();
      }, [data]);

      const calculateStats = (filteredData) => {
        const stats = {
          Goals: 0, Assists: 0, 'Total Shots Chances': 0, 'Total Pass Chances': 0, 'Total Miss + Post': 0,
          'EV Entries': 0, 'EV Carry-in': 0, 'EV Passing': 0, 'EV Uncontrolled': 0, 'EV Dump-ins': 0
        };
        
        filteredData.forEach(row => {
          const action = (row.ACTION || '').toUpperCase();
          const danger = (row.Danger || '').toUpperCase();
          const strength = row.Strength || '';
          const isHMDanger = ['HD', 'MD'].includes(danger);

          if (action === 'GOAL') stats.Goals++;
          if (action === 'ASSIST') stats.Assists++;
          if (isHMDanger && ['S', 'GOAL'].includes(action)) stats['Total Shots Chances']++;
          if (isHMDanger && ['P', 'ASSIST'].includes(action)) stats['Total Pass Chances']++;
          if (isHMDanger && ['M', 'POST'].includes(action)) stats['Total Miss + Post']++;

          if (strength === 'EV') {
            if (action === 'CE') stats['EV Carry-in']++;
            if (action === 'UCE') stats['EV Uncontrolled']++;
            if (action === 'D') stats['EV Dump-ins']++;
            if (['CE', 'UCE', 'D'].includes(action)) stats['EV Entries']++;
          }
        });

        stats['Total Chance Plays'] = stats['Total Shots Chances'] + stats['Total Miss + Post'];
        return stats;
      };

      const gameAnalyticsByTeam = useMemo(() => {
        let filtered = data;
        if (selectedGames.length > 0) filtered = filtered.filter(row => selectedGames.includes(row.Game));
        if (selectedStrengths.length > 0) filtered = filtered.filter(row => selectedStrengths.includes(row.Strength));
        
        const teamStats = {};
        [...new Set(filtered.map(row => row.Team))].forEach(team => {
          teamStats[team] = calculateStats(filtered.filter(row => row.Team === team));
        });
        return teamStats;
      }, [data, selectedGames, selectedStrengths]);

      const gamePlayerStats = useMemo(() => {
        let filtered = data;
        if (selectedGames.length > 0) filtered = filtered.filter(row => selectedGames.includes(row.Game));
        if (selectedStrengths.length > 0) filtered = filtered.filter(row => selectedStrengths.includes(row.Strength));

        const playerStats = {};
        filtered.forEach(row => {
          const playerNum = row.Number;
          if (!playerNum) return;
          if (!playerStats[playerNum]) {
            playerStats[playerNum] = { number: playerNum, team: row.Team, stats: { Goals: 0, Assists: 0, 'Total Shots Chances': 0, 'Total Pass Chances': 0, 'Total Miss + Post': 0, 'EV Entries': 0, 'EV Carry-in': 0, 'EV Passing': 0, 'EV Uncontrolled': 0, 'EV Dump-ins': 0 } };
          }
          const action = (row.ACTION || '').toUpperCase();
          const danger = (row.Danger || '').toUpperCase();
          const strength = row.Strength || '';
          const isHMDanger = ['HD', 'MD'].includes(danger);

          if (action === 'GOAL') playerStats[playerNum].stats.Goals++;
          if (action === 'ASSIST') playerStats[playerNum].stats.Assists++;
          if (isHMDanger && ['S', 'GOAL'].includes(action)) playerStats[playerNum].stats['Total Shots Chances']++;
          if (isHMDanger && ['P', 'ASSIST'].includes(action)) playerStats[playerNum].stats['Total Pass Chances']++;
          if (isHMDanger && ['M', 'POST'].includes(action)) playerStats[playerNum].stats['Total Miss + Post']++;
          
          if (strength === 'EV') {
            if (action === 'CE') playerStats[playerNum].stats['EV Carry-in']++;
            if (action === 'UCE') playerStats[playerNum].stats['EV Uncontrolled']++;
            if (action === 'D') playerStats[playerNum].stats['EV Dump-ins']++;
            if (['CE', 'UCE', 'D'].includes(action)) playerStats[playerNum].stats['EV Entries']++;
          }
        });

        return Object.values(playerStats).map(player => ({
          ...player,
          stats: { ...player.stats, 'Total Chance Plays': player.stats['Total Shots Chances'] + player.stats['Total Miss + Post'] }
        })).sort((a, b) => parseInt(a.number) - parseInt(b.number));
      }, [data, selectedGames, selectedStrengths]);

      const playerAnalytics = useMemo(() => {
        let filtered = data;
        const gameTypeKey = Object.keys(data[0] || {}).find(k => k.toLowerCase().includes('game') && k.toLowerCase().includes('type'));
        
        if (selectedTeams.length > 0) filtered = filtered.filter(row => selectedTeams.includes(row.Team));
        if (selectedGames.length > 0) filtered = filtered.filter(row => selectedGames.includes(row.Game));
        if (selectedStrengths.length > 0) filtered = filtered.filter(row => selectedStrengths.includes(row.Strength));
        if (selectedGameTypes.length > 0 && gameTypeKey) filtered = filtered.filter(row => selectedGameTypes.includes(row[gameTypeKey]));

        const playerStats = {};
        filtered.forEach(row => {
          const playerNum = row.Number;
          const team = row.Team;
          if (!playerNum) return;
          const playerKey = `${playerNum}_${team}`;
          
          if (!playerStats[playerKey]) {
            playerStats[playerKey] = { number: playerNum, team: team, gamesPlayed: new Set(), stats: { Goals: 0, Assists: 0, 'Total Shots Chances': 0, 'Total Pass Chances': 0, 'Total Miss + Post': 0, 'EV Entries': 0, 'EV Carry-in': 0, 'EV Passing': 0, 'EV Uncontrolled': 0, 'EV Dump-ins': 0 } };
          }

          playerStats[playerKey].gamesPlayed.add(row.Game);

          const action = (row.ACTION || '').toUpperCase();
          const danger = (row.Danger || '').toUpperCase();
          const strength = row.Strength || '';
          const isHMDanger = ['HD', 'MD'].includes(danger);

          if (action === 'GOAL') playerStats[playerKey].stats.Goals++;
          if (action === 'ASSIST') playerStats[playerKey].stats.Assists++;
          if (isHMDanger && ['S', 'GOAL'].includes(action)) playerStats[playerKey].stats['Total Shots Chances']++;
          if (isHMDanger && ['P', 'ASSIST'].includes(action)) playerStats[playerKey].stats['Total Pass Chances']++;
          if (isHMDanger && ['M', 'POST'].includes(action)) playerStats[playerKey].stats['Total Miss + Post']++;

          if (strength === 'EV') {
            if (action === 'CE') playerStats[playerKey].stats['EV Carry-in']++;
            if (action === 'UCE') playerStats[playerKey].stats['EV Uncontrolled']++;
            if (action === 'D') playerStats[playerKey].stats['EV Dump-ins']++;
            if (['CE', 'UCE', 'D'].includes(action)) playerStats[playerKey].stats['EV Entries']++;
          }
        });

        return Object.values(playerStats).map(player => ({
          ...player,
          gamesPlayed: player.gamesPlayed.size,
          stats: { ...player.stats, 'Total Chance Plays': player.stats['Total Shots Chances'] + player.stats['Total Pass Chances'] + player.stats['Total Miss + Post'] }
        })).sort((a, b) => {
          const tc = a.team.localeCompare(b.team);
          return tc !== 0 ? tc : parseInt(a.number) - parseInt(b.number);
        });
      }, [data, selectedTeams, selectedGames, selectedStrengths, selectedGameTypes]);

      return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white' },
        React.createElement('div', { className: 'sticky top-0 z-50 border-b border-slate-700 bg-slate-900/95' },
          React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-4' },
            React.createElement('div', { className: 'flex items-center justify-between mb-4' },
              React.createElement('div', null,
                React.createElement('h1', { className: 'text-3xl font-bold' }, 'Hockey Stats Dashboard'),
                React.createElement('p', { className: 'text-slate-400 text-sm mt-1' }, 'Advanced Analytics')
              ),
              React.createElement('label', { className: 'flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg cursor-pointer' },
                React.createElement('span', { className: 'text-sm font-medium' }, '📤 Upload CSV'),
                React.createElement('input', { type: 'file', accept: '.csv', onChange: handleFileUpload, className: 'hidden' })
              )
            ),
            React.createElement('div', { className: 'flex gap-2' },
              React.createElement('button', { onClick: () => setCurrentPage('game'), className: `px-4 py-2 rounded-lg font-medium ${currentPage === 'game' ? 'bg-blue-600' : 'text-slate-300 hover:bg-slate-700'}` }, 'Game Analytics'),
              React.createElement('button', { onClick: () => setCurrentPage('player'), className: `px-4 py-2 rounded-lg font-medium ${currentPage === 'player' ? 'bg-blue-600' : 'text-slate-300 hover:bg-slate-700'}` }, 'Player Analytics')
            )
          )
        ),
        React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-8' },
          data.length === 0 ? React.createElement('div', { className: 'text-center py-16' },
            React.createElement('div', { className: 'inline-block p-12 bg-slate-800/50 rounded-2xl border border-slate-700' },
              React.createElement('h2', { className: 'text-2xl font-bold mb-2' }, '⬆️ Upload Your CSV'),
              React.createElement('p', { className: 'text-slate-400' }, 'Export your "All Games" tab from Google Sheets as CSV')
            )
          ) : currentPage === 'game' ? React.createElement('div', null,
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4 mb-8' },
              React.createElement('div', { className: 'relative' },
                React.createElement('button', { onClick: () => setGameFiltersOpen(!gameFiltersOpen), className: 'w-full text-left bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white' },
                  React.createElement('span', null, selectedGames.length === 0 ? 'Select Games' : `${selectedGames.length} selected`)
                ),
                gameFiltersOpen && React.createElement('div', { className: 'absolute top-full left-0 right-0 mt-2 bg-slate-700 border border-slate-600 rounded-lg z-10 p-3 max-h-48 overflow-y-auto' },
                  games.map(game => React.createElement('label', { key: game, className: 'flex items-center gap-2 p-2 hover:bg-slate-600 rounded cursor-pointer' },
                    React.createElement('input', { type: 'checkbox', checked: selectedGames.includes(game), onChange: () => setSelectedGames(prev => prev.includes(game) ? prev.filter(g => g !== game) : [...prev, game]), className: 'w-4 h-4' }),
                    React.createElement('span', { className: 'text-sm' }, game)
                  ))
                )
              ),
              React.createElement('div', { className: 'relative' },
                React.createElement('button', { onClick: () => setStrengthFiltersOpen(!strengthFiltersOpen), className: 'w-full text-left bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white' },
                  React.createElement('span', null, selectedStrengths.length === 0 ? 'Select Strength' : `${selectedStrengths.length} selected`)
                ),
                strengthFiltersOpen && React.createElement('div', { className: 'absolute top-full left-0 right-0 mt-2 bg-slate-700 border border-slate-600 rounded-lg z-10 p-3' },
                  strengths.map(strength => React.createElement('label', { key: strength, className: 'flex items-center gap-2 p-2 hover:bg-slate-600 rounded cursor-pointer' },
                    React.createElement('input', { type: 'checkbox', checked: selectedStrengths.includes(strength), onChange: () => setSelectedStrengths(prev => prev.includes(strength) ? prev.filter(s => s !== strength) : [...prev, strength]), className: 'w-4 h-4' }),
                    React.createElement('span', { className: 'text-sm' }, strength)
                  ))
                )
              )
            ),
            Object.keys(gameAnalyticsByTeam).map(team => React.createElement('div', { key: team, className: 'mb-12' },
              React.createElement('h2', { className: 'text-2xl font-bold text-white mb-4' }, team),
              React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4 mb-8' },
                ['Goals', 'Assists', 'Total Chance Plays', 'Total Shots Chances', 'Total Pass Chances', 'Total Miss + Post', 'EV Entries'].map(stat => 
                  React.createElement('div', { key: stat, className: 'bg-slate-800 rounded-lg p-4 border border-slate-700' },
                    React.createElement('p', { className: 'text-xs font-semibold text-slate-400 uppercase mb-1' }, stat),
                    React.createElement('p', { className: 'text-2xl font-bold text-white' }, gameAnalyticsByTeam[team][stat])
                  )
                )
              )
            ))
          ) : React.createElement('div', null,
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-4 gap-4 mb-8' },
              React.createElement('div', { className: 'relative' },
                React.createElement('button', { onClick: () => setTeamFiltersOpen(!teamFiltersOpen), className: 'w-full text-left bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white' },
                  React.createElement('span', null, selectedTeams.length === 0 ? 'Select Teams' : `${selectedTeams.length} selected`)
                ),
                teamFiltersOpen && React.createElement('div', { className: 'absolute top-full left-0 right-0 mt-2 bg-slate-700 border border-slate-600 rounded-lg z-10 p-3 max-h-48 overflow-y-auto' },
                  teams.map(team => React.createElement('label', { key: team, className: 'flex items-center gap-2 p-2 hover:bg-slate-600 rounded cursor-pointer' },
                    React.createElement('input', { type: 'checkbox', checked: selectedTeams.includes(team), onChange: () => setSelectedTeams(prev => prev.includes(team) ? prev.filter(t => t !== team) : [...prev, team]), className: 'w-4 h-4' }),
                    React.createElement('span', { className: 'text-sm' }, team)
                  ))
                )
              )
            ),
            React.createElement('table', { className: 'w-full text-sm bg-slate-800 rounded-lg border border-slate-700' },
              React.createElement('thead', null,
                React.createElement('tr', { className: 'bg-slate-700/50 border-b border-slate-700' },
                  React.createElement('th', { className: 'px-4 py-3 text-left' }, 'No.'),
                  React.createElement('th', { className: 'px-4 py-3 text-left' }, 'Team'),
                  React.createElement('th', { className: 'px-4 py-3 text-right' }, 'GP'),
                  React.createElement('th', { className: 'px-4 py-3 text-right' }, 'G'),
                  React.createElement('th', { className: 'px-4 py-3 text-right' }, 'A'),
                  React.createElement('th', { className: 'px-4 py-3 text-right' }, 'Chances')
                )
              ),
              React.createElement('tbody', null,
                playerAnalytics.length === 0 ? React.createElement('tr', null,
                  React.createElement('td', { colSpan: 6, className: 'px-4 py-8 text-center text-slate-400' }, 'No data available')
                ) : playerAnalytics.map((player, idx) => React.createElement('tr', { key: idx, className: 'border-b border-slate-700/50 hover:bg-slate-700/30' },
                  React.createElement('td', { className: 'px-4 py-3 font-bold text-blue-400' }, player.number),
                  React.createElement('td', { className: 'px-4 py-3' }, player.team),
                  React.createElement('td', { className: 'px-4 py-3 text-right text-orange-400' }, player.gamesPlayed),
                  React.createElement('td', { className: 'px-4 py-3 text-right text-yellow-400' }, player.stats.Goals),
                  React.createElement('td', { className: 'px-4 py-3 text-right text-cyan-400' }, player.stats.Assists),
                  React.createElement('td', { className: 'px-4 py-3 text-right' }, player.stats['Total Chance Plays'])
                ))
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(HockeyStatsDashboard));
  </script>
</body>
</html>
